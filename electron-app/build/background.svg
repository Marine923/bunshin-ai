<?xml version="1.0" encoding="UTF-8"?>
<!-- DMG mount window background. Sized 540x380 logical px (window
     size); rendered at 2x for Retina via sharp. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380">
  <defs>
    <linearGradient id="dmgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1124"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#3b1265"/>
    </linearGradient>
    <radialGradient id="dmgHalo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dmgArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="540" height="380" fill="url(#dmgBg)"/>
  <rect width="540" height="380" fill="url(#dmgHalo)"/>

  <!-- Subtle texture lines -->
  <g stroke="#a5b4fc" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="100" x2="540" y2="100"/>
    <line x1="0" y1="200" x2="540" y2="200"/>
    <line x1="0" y1="300" x2="540" y2="300"/>
  </g>

  <!-- Top: title -->
  <g font-family="-apple-system, 'Hiragino Sans', sans-serif">
    <text x="270" y="60" text-anchor="middle"
          fill="#f4f5f7" font-size="22" font-weight="600"
          letter-spacing="-0.3">
      Bunshin
    </text>
    <text x="270" y="86" text-anchor="middle"
          fill="#a5b4fc" font-size="11" font-weight="500"
          letter-spacing="0.5" opacity="0.85">
      Drag to Applications →
    </text>
  </g>

  <!-- Arrow between the two icons (drawn behind, hint at the drag
       direction). The two app icons are placed by electron-builder
       at x=130 (Bunshin) and x=410 (Applications shortcut), y=220. -->
  <g transform="translate(270 240)">
    <path d="M -80 0 L 80 0"
          stroke="url(#dmgArrow)" stroke-width="2.5"
          stroke-linecap="round" opacity="0.55"
          stroke-dasharray="6 6"/>
    <path d="M 72 -8 L 88 0 L 72 8"
          fill="none" stroke="url(#dmgArrow)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"
          opacity="0.7"/>
  </g>

  <!-- Footnote -->
  <text x="270" y="350" text-anchor="middle"
        fill="#5d6271" font-size="10"
        font-family="-apple-system, 'Hiragino Sans', sans-serif"
        letter-spacing="0.5">
    Personal memory engine · Local-first · AI-agnostic
  </text>
</svg>
