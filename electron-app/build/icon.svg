<?xml version="1.0" encoding="UTF-8"?>
<!-- Bunshin app icon — provisional design.
     Concept: two concentric "selves" (you + your bunshin) revolving
     around a shared core. The smaller orbit suggests memory loops,
     the gradient evokes "AI" without being clichéd. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4a8fef" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a8fef" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a8fef"/>
      <stop offset="100%" stop-color="#a04aef"/>
    </linearGradient>

    <linearGradient id="ring2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fbf6f"/>
      <stop offset="100%" stop-color="#4a8fef"/>
    </linearGradient>

    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d4ef"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Rounded-square background (macOS icon shape) -->
  <rect x="64" y="64" width="896" height="896" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Soft halo -->
  <circle cx="512" cy="512" r="380" fill="url(#glow)"/>

  <!-- Outer "self" — the larger orbit (= you in the real world) -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="url(#ring1)" stroke-width="14" opacity="0.9"/>
  <circle cx="512" cy="232" r="32" fill="url(#ring1)"/>

  <!-- Inner "bunshin" — the smaller orbit, offset, sharing the center -->
  <circle cx="512" cy="512" r="170" fill="none" stroke="url(#ring2)" stroke-width="10" opacity="0.85"/>
  <circle cx="682" cy="512" r="22" fill="url(#ring2)"/>

  <!-- Shared core (memory) -->
  <circle cx="512" cy="512" r="46" fill="url(#core)" filter="url(#soft-shadow)"/>
  <circle cx="512" cy="512" r="46" fill="url(#core)"/>
</svg>
