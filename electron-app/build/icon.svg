<?xml version="1.0" encoding="UTF-8"?>
<!-- A: 無限ループ ∞ + 知識グラフのノード（現状の改良版） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fff7ed"/>
      <stop offset="60%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#halo)"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#a5b4fc" stroke-width="2" opacity="0.12"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.18"/>
  <g transform="translate(512 512)" filter="url(#softGlow)">
    <path d="M -250 0 C -250 -140, -110 -140, 0 0 C 110 140, 250 140, 250 0 C 250 -140, 110 -140, 0 0 C -110 140, -250 140, -250 0 Z"
        fill="none" stroke="url(#ribbon)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g fill="#e0e7ff" opacity="0.95">
    <circle cx="180" cy="512" r="14"/>
    <circle cx="844" cy="512" r="14"/>
    <circle cx="512" cy="180" r="10" opacity="0.7"/>
    <circle cx="512" cy="844" r="10" opacity="0.7"/>
    <circle cx="270" cy="270" r="8" opacity="0.55"/>
    <circle cx="754" cy="754" r="8" opacity="0.55"/>
    <circle cx="754" cy="270" r="8" opacity="0.55"/>
    <circle cx="270" cy="754" r="8" opacity="0.55"/>
  </g>
  <g filter="url(#coreGlow)">
    <circle cx="512" cy="512" r="46" fill="url(#core)"/>
  </g>
  <circle cx="512" cy="512" r="18" fill="#fffbeb"/>
</svg>
