name: Deploy landing page

# bunshinmemory.com の landing page を GitHub Pages に自動 deploy。
# docs/landing/ の変更 push で発火。bunshinmemory.com への CNAME 設定後は
# pages の Custom domain にも反映される (CNAME ファイル参照)。

on:
  push:
    branches: [main]
    paths:
      - "docs/landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp -r docs/landing/* _site/
          # CNAME for custom domain (no-op if file doesn't exist yet).
          if [ -f docs/landing/CNAME ]; then
            cp docs/landing/CNAME _site/CNAME
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # Auto-enable Pages on first run (no manual repo setting needed)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
