name: Build Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install npm deps
        working-directory: electron-app
        run: npm ci

      - name: Build icon (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: electron-app
        run: npm run icon:build

      - name: Build & package
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --publish never: build only, don't try to upload to release
        # (auto-publish requires draft release + GITHUB_TOKEN scopes
        # we don't grant by default). DMGs land in dist/ and are
        # uploaded as workflow artifacts in the next step.
        run: npm run dist -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bunshin-${{ matrix.os }}
          path: |
            electron-app/dist/*.dmg
            electron-app/dist/*.AppImage
            electron-app/dist/*.deb
            electron-app/dist/*.exe
          if-no-files-found: warn
          retention-days: 14
