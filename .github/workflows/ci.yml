name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install bunshin
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest

      - name: Run pytest
        run: pytest

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ || true   # advisory for now

  lint-index-html:
    # v0.10.x guard against the v0.9.20 bug: a `\n` inside a //
    # JS comment in INDEX_HTML gets Python-interpolated into a real
    # newline, ending the comment early and breaking the JS parse.
    # scripts/lint_index_html.py serves the same INDEX_HTML through
    # `node --check` and exits non-zero on SyntaxError.
    name: lint INDEX_HTML JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install bunshin
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run JS-in-HTML linter
        run: python scripts/lint_index_html.py
